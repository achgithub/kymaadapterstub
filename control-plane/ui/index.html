<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyma Adapter Stub - Control Plane</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">🔧 Kyma Adapter Stub</a>
            <span class="navbar-text text-light">Control Plane</span>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Scenarios</h2>
                    <div>
                        <button class="btn btn-outline-warning me-2" id="cleanupBtn" onclick="cleanupOrphanedResources()">
                            🧹 Cleanup Orphaned Pods
                        </button>
                        <button class="btn btn-outline-secondary me-2" onclick="openImportExport()">
                            ⇅ Import / Export
                        </button>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newScenarioModal">
                            + New Scenario
                        </button>
                    </div>
                </div>

                <div id="scenariosList" class="row">
                    <!-- Scenarios will be loaded here -->
                    <div class="col-12">
                        <p class="text-muted">Loading scenarios...</p>
                    </div>
                </div>

                <div class="mt-4" id="systemLogSection" style="display:none">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="text-muted mb-0">System Log</h6>
                        <div class="d-flex align-items-center gap-2">
                            <label class="text-muted small mb-0">Tail</label>
                            <input type="number" id="logTailInput" class="form-control form-control-sm" value="50" min="1" max="1000" style="width:75px">
                            <button class="btn btn-outline-secondary btn-sm" onclick="loadSystemLog()">Refresh</button>
                        </div>
                    </div>
                    <div id="systemLog" class="bg-dark text-light rounded p-3 small" style="font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Scenario Modal -->
    <div class="modal fade" id="newScenarioModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Scenario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="scenarioName" class="form-label">Scenario Name</label>
                        <input type="text" class="form-control" id="scenarioName" placeholder="e.g., Payment Integration Test">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="createScenarioBtn">Create</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Import / Export Modal -->
    <div class="modal fade" id="importExportModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Import / Export Scenarios</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs mb-3" id="importExportTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="exportTabBtn" data-bs-toggle="tab" data-bs-target="#exportTab" type="button" role="tab">Export</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="importTabBtn" data-bs-toggle="tab" data-bs-target="#importTab" type="button" role="tab">Import</button>
                        </li>
                    </ul>
                    <div class="tab-content">

                        <!-- Export Tab -->
                        <div class="tab-pane fade show active" id="exportTab" role="tabpanel">
                            <div class="mb-3">
                                <label class="form-label">Select Scenario to Export</label>
                                <select class="form-select" id="exportScenarioSelect" onchange="loadExportPreview()">
                                    <option value="">-- Select a scenario --</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <textarea class="form-control font-monospace" id="exportJsonText" rows="16" readonly placeholder="Select a scenario above to preview its JSON..."></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-outline-primary" id="copyExportBtn" onclick="copyExportJson()" disabled>Copy</button>
                                <button class="btn btn-primary" id="downloadExportBtn" onclick="downloadExportJson()" disabled>Download .json</button>
                            </div>
                        </div>

                        <!-- Import Tab -->
                        <div class="tab-pane fade" id="importTab" role="tabpanel">
                            <div class="mb-3">
                                <label class="form-label">Upload a JSON file</label>
                                <input type="file" class="form-control" id="importFileInput" accept=".json" onchange="handleImportFile(event)">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">or paste JSON directly</label>
                                <textarea class="form-control font-monospace" id="importJsonText" rows="16" placeholder='{"version":1,"name":"My Scenario","adapters":[]}'></textarea>
                            </div>
                        </div>

                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success" id="importBtn" onclick="importScenario()" style="display:none;">Import Scenario</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
